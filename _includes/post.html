<article class="post">
	<h1 class="title">
		<a href="{{ post.url }}">{{ post.title }}</a>
	</h1>
	<div class="date"><time pubdate datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%a, %b %d %Y" }}</time></div>
	<div class="body">
		{{ post.content }}
	</div>

	{% if post.tags and post.tags.size > 0 %}
	<div class="tags small">
		Tags:
		{% for tag in post.tags %}
			<a href="/categories.html#{{ tag | slugify }}">{{ tag }}</a>{% unless forloop.last %}, {% endunless %}
		{% endfor %}
	</div>
	{% endif %}
</article>
